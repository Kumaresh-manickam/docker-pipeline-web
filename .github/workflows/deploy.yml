name: Deploy Docker Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build and Run Docker Container Locally
      run: |
        mkdir -p ~/docker-build
        cp -r * ~/docker-build/
        cd ~/docker-build
        
        # Build the image safely
        docker build -t my-docker-web:latest .
        
        # Stop and remove existing container if it exists, without crashing if it doesn't
        docker stop live-web-container || true
        docker rm -f live-web-container || true
        
        # Run the new container cleanly
        docker run -d --name live-web-container -p 80:80 my-docker-web:latest
