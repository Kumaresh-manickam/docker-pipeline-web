name: Deploy Docker Web App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Build and Run Container
      run: |
        docker stop live-web-container || true
        docker rm -f live-web-container || true
        docker build -t my-docker-web:latest .
        docker run -d --name live-web-container -p 8080:80 my-docker-web:latest
